name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install bootstrap FPC
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: ~/fpc-trunk
          key: fpc-trunk-linux-x86_64-v3

      - name: Build FPC trunk from source
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch main https://gitlab.com/freepascal.org/fpc/source.git ~/fpc-src
          cd ~/fpc-src
          make all FPCDIR=$(pwd) PP=$(which ppcx64) OPT="-O2"
          mkdir -p ~/fpc-trunk/bin ~/fpc-trunk/lib
          make install FPCDIR=$(pwd) PP=$(pwd)/compiler/ppcx64 PREFIX=~/fpc-trunk
          # Generate fpc.cfg
          ~/fpc-trunk/bin/fpcmkcfg -d basepath=~/fpc-trunk/lib/fpc/\$fpcversion -o ~/fpc-trunk/bin/fpc.cfg

      - name: Setup PATH
        run: |
          FPC_BIN=$(find ~/fpc-trunk -name fpc -type f | head -1)
          if [ -n "$FPC_BIN" ]; then
            echo "$(dirname $FPC_BIN)" >> $GITHUB_PATH
            PPCDIR=$(find ~/fpc-trunk -name ppcx64 -type f | head -1)
            if [ -n "$PPCDIR" ]; then
              echo "$(dirname $PPCDIR)" >> $GITHUB_PATH
            fi
          else
            echo "FPC trunk build failed, using system FPC"
          fi

      - name: Verify FPC
        run: fpc -iV

      - name: Run all tests
        run: make test

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install bootstrap FPC
        run: brew install fpc

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: ~/fpc-trunk
          key: fpc-trunk-macos-aarch64-v3

      - name: Build FPC trunk from source
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch main https://gitlab.com/freepascal.org/fpc/source.git ~/fpc-src
          cd ~/fpc-src
          PP=$(find /usr/local/lib/fpc /opt/homebrew/lib/fpc -name 'ppca64' -o -name 'ppcaarch64' 2>/dev/null | head -1)
          if [ -z "$PP" ]; then PP=$(which ppca64 2>/dev/null || which ppcaarch64 2>/dev/null); fi
          echo "Bootstrap compiler: $PP"
          make all FPCDIR=$(pwd) PP="$PP" OPT="-O2"
          mkdir -p ~/fpc-trunk
          make install FPCDIR=$(pwd) PP=$(pwd)/compiler/ppca64 PREFIX=~/fpc-trunk
          ~/fpc-trunk/bin/fpcmkcfg -d basepath=~/fpc-trunk/lib/fpc/\$fpcversion -o ~/fpc-trunk/bin/fpc.cfg

      - name: Setup PATH
        run: |
          FPC_BIN=$(find ~/fpc-trunk -name fpc -type f | head -1)
          if [ -n "$FPC_BIN" ]; then
            echo "$(dirname $FPC_BIN)" >> $GITHUB_PATH
          fi
          PPC_BIN=$(find ~/fpc-trunk -name 'ppca64' -o -name 'ppcaarch64' | head -1)
          if [ -n "$PPC_BIN" ]; then
            echo "$(dirname $PPC_BIN)" >> $GITHUB_PATH
          fi

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        run: |
          TOTAL=0; PASSED=0; SKIPPED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              SKIPPED=$((SKIPPED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== macOS: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
          if [ $PASSED -eq 0 ]; then exit 1; fi

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: C:\fpc-trunk
          key: fpc-trunk-windows-x86_64-v3

      - name: Install bootstrap and build FPC trunk
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install freepascal --yes --no-progress
          git clone --depth 1 --branch main https://gitlab.com/freepascal.org/fpc/source.git C:\fpc-src
          cd C:\fpc-src
          $env:PATH = "C:\FPC\3.2.2\bin\i386-win32;$env:PATH"
          make all FPCDIR=. PP=ppcrossx64.exe OPT="-O2" OS_TARGET=win64 CPU_TARGET=x86_64 2>&1 | Select-Object -Last 10
          New-Item -ItemType Directory -Force -Path C:\fpc-trunk\bin
          make install FPCDIR=. PREFIX=C:\fpc-trunk OS_TARGET=win64 CPU_TARGET=x86_64 2>&1 | Select-Object -Last 5

      - name: Setup PATH
        shell: bash
        run: |
          echo "C:/fpc-trunk/bin" >> $GITHUB_PATH
          find "C:/fpc-trunk" -name "*.exe" 2>/dev/null | head -5 || true

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        shell: bash
        run: |
          TOTAL=0; PASSED=0; SKIPPED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              SKIPPED=$((SKIPPED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== Windows: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
          if [ $PASSED -eq 0 ]; then exit 1; fi

  test-freebsd:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Test on FreeBSD
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.1"
          run: |
            sudo pkg install -y fpc
            fpc -iV
            TOTAL=0; PASSED=0; SKIPPED=0
            for mk in $(find tests -mindepth 2 -name Makefile | sort); do
              dir=$(dirname "$mk")
              TOTAL=$((TOTAL + 1))
              if make -C "$dir" test >/dev/null 2>&1; then
                PASSED=$((PASSED + 1))
                echo "PASS: $dir"
              else
                SKIPPED=$((SKIPPED + 1))
                echo "SKIP: $dir"
              fi
            done
            echo ""
            echo "=== FreeBSD: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
