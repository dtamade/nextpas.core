name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: |
            ~/fpcupdeluxe
          key: fpc-trunk-linux-x86_64-v2

      - name: Install FPC trunk via fpcupdeluxe
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/fpcupdeluxe
          wget -q "https://github.com/LongDirtyAnimAlf/Reinern/releases/latest/download/fpcupdeluxe-x86_64-linux" -O ~/fpcupdeluxe/fpcupdeluxe
          chmod +x ~/fpcupdeluxe/fpcupdeluxe
          ~/fpcupdeluxe/fpcupdeluxe --installdir=~/fpcupdeluxe --fpcURL=trunk --only=FPC --noconfirm

      - name: Setup PATH
        run: |
          echo "$HOME/fpcupdeluxe/fpc/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Verify FPC
        run: fpc -iV

      - name: Run all tests
        run: make test

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: |
            ~/fpcupdeluxe
          key: fpc-trunk-macos-aarch64-v2

      - name: Install FPC trunk via fpcupdeluxe
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/fpcupdeluxe
          wget -q "https://github.com/LongDirtyAnimAlf/Reinern/releases/latest/download/fpcupdeluxe-aarch64-darwin" -O ~/fpcupdeluxe/fpcupdeluxe
          chmod +x ~/fpcupdeluxe/fpcupdeluxe
          ~/fpcupdeluxe/fpcupdeluxe --installdir=~/fpcupdeluxe --fpcURL=trunk --only=FPC --noconfirm

      - name: Setup PATH
        run: |
          FPC_BIN=$(find ~/fpcupdeluxe/fpc/bin -name fpc -type f | head -1)
          echo "$(dirname $FPC_BIN)" >> $GITHUB_PATH

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        run: |
          TOTAL=0; PASSED=0; FAILED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              FAILED=$((FAILED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== macOS summary: $PASSED passed, $FAILED skipped, $TOTAL total ==="

  test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Cache FPC trunk
        id: cache-fpc
        uses: actions/cache@v4
        with:
          path: |
            C:\fpcupdeluxe
          key: fpc-trunk-windows-x86_64-v2

      - name: Install FPC trunk via fpcupdeluxe
        if: steps.cache-fpc.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\fpcupdeluxe
          Invoke-WebRequest -Uri "https://github.com/LongDirtyAnimAlf/Reinern/releases/latest/download/fpcupdeluxe-x86_64-win64.exe" -OutFile "C:\fpcupdeluxe\fpcupdeluxe.exe"
          & C:\fpcupdeluxe\fpcupdeluxe.exe --installdir=C:\fpcupdeluxe --fpcURL=trunk --only=FPC --noconfirm

      - name: Setup PATH
        run: |
          echo "C:/fpcupdeluxe/fpc/bin/x86_64-win64" >> $GITHUB_PATH
          echo "C:/fpcupdeluxe/fpc/bin/i386-win32" >> $GITHUB_PATH

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        run: |
          TOTAL=0; PASSED=0; FAILED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              FAILED=$((FAILED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== Windows summary: $PASSED passed, $FAILED skipped, $TOTAL total ==="

  test-freebsd:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Test on FreeBSD
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.1"
          run: |
            sudo pkg install -y fpc
            fpc -iV
            TOTAL=0; PASSED=0; FAILED=0
            for mk in $(find tests -mindepth 2 -name Makefile | sort); do
              dir=$(dirname "$mk")
              TOTAL=$((TOTAL + 1))
              if make -C "$dir" test >/dev/null 2>&1; then
                PASSED=$((PASSED + 1))
                echo "PASS: $dir"
              else
                FAILED=$((FAILED + 1))
                echo "SKIP: $dir"
              fi
            done
            echo ""
            echo "=== FreeBSD summary: $PASSED passed, $FAILED skipped, $TOTAL total ==="
