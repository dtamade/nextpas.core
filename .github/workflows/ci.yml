name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup FPC trunk
        uses: ollydev/setup-lazarus-fpcup@v1
        with:
          laz: "stable"
          fpc: "main"

      - name: Verify FPC
        run: fpc -iV

      - name: Run all tests
        run: make test

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup FPC trunk
        uses: ollydev/setup-lazarus-fpcup@v1
        with:
          laz: "stable"
          fpc: "main"

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        run: |
          TOTAL=0; PASSED=0; SKIPPED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              SKIPPED=$((SKIPPED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== macOS: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
          if [ $PASSED -eq 0 ]; then exit 1; fi

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup FPC trunk
        uses: ollydev/setup-lazarus-fpcup@v1
        with:
          laz: "stable"
          fpc: "main"

      - name: Verify FPC
        run: fpc -iV

      - name: Run tests (best-effort)
        shell: bash
        run: |
          TOTAL=0; PASSED=0; SKIPPED=0
          while IFS= read -r mk; do
            dir=$(dirname "$mk")
            TOTAL=$((TOTAL + 1))
            if make -C "$dir" test >/dev/null 2>&1; then
              PASSED=$((PASSED + 1))
              echo "PASS: $dir"
            else
              SKIPPED=$((SKIPPED + 1))
              echo "SKIP: $dir"
            fi
          done < <(find tests -mindepth 2 -name Makefile | sort)
          echo ""
          echo "=== Windows: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
          if [ $PASSED -eq 0 ]; then exit 1; fi

  test-freebsd:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Test on FreeBSD
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.1"
          run: |
            sudo pkg install -y fpc
            fpc -iV
            TOTAL=0; PASSED=0; SKIPPED=0
            for mk in $(find tests -mindepth 2 -name Makefile | sort); do
              dir=$(dirname "$mk")
              TOTAL=$((TOTAL + 1))
              if make -C "$dir" test >/dev/null 2>&1; then
                PASSED=$((PASSED + 1))
                echo "PASS: $dir"
              else
                SKIPPED=$((SKIPPED + 1))
                echo "SKIP: $dir"
              fi
            done
            echo ""
            echo "=== FreeBSD: $PASSED passed, $SKIPPED skipped, $TOTAL total ==="
